<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="medicalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.03" />
    </radialGradient>
    <pattern id="subtleGrid" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="none"/>
      <circle cx="25" cy="25" r="1" fill="#0ea5e9" opacity="0.05"/>
      <circle cx="75" cy="75" r="1" fill="#0ea5e9" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  <rect width="1920" height="1080" fill="url(#subtleGrid)"/>
  <rect width="1920" height="1080" fill="url(#medicalGlow)"/>

  <!-- Medical Office Setting -->
  <!-- Examination Table -->
  <g transform="translate(1400, 600)" opacity="0.1">
    <rect x="0" y="80" width="200" height="15" rx="5" fill="#64748b"/>
    <rect x="0" y="60" width="200" height="20" rx="5" fill="#94a3b8"/>
    <rect x="10" y="40" width="180" height="20" rx="5" fill="#cbd5e1"/>
    <!-- Table legs -->
    <rect x="20" y="95" width="8" height="40" fill="#64748b"/>
    <rect x="172" y="95" width="8" height="40" fill="#64748b"/>
  </g>

  <!-- Medical Equipment -->
  <!-- Blood Pressure Monitor -->
  <g transform="translate(1600, 400)" opacity="0.12">
    <rect x="0" y="20" width="80" height="60" rx="8" fill="#0ea5e9"/>
    <rect x="10" y="30" width="60" height="8" fill="#ffffff"/>
    <rect x="10" y="45" width="60" height="8" fill="#ffffff"/>
    <circle cx="40" cy="70" r="15" fill="#0ea5e9"/>
    <rect x="25" y="85" width="30" height="8" fill="#0ea5e9"/>
  </g>

  <!-- Stethoscope -->
  <g transform="translate(1200, 350)" opacity="0.15">
    <circle cx="50" cy="50" r="35" fill="#0ea5e9"/>
    <circle cx="130" cy="50" r="25" fill="#0ea5e9"/>
    <path d="M50 50 Q90 25 130 50" stroke="#0ea5e9" stroke-width="10" fill="none"/>
    <rect x="130" y="25" width="15" height="50" fill="#0ea5e9"/>
    <circle cx="137" cy="20" r="8" fill="#0ea5e9"/>
  </g>

  <!-- Doctor Figure -->
  <g transform="translate(1100, 500)" opacity="0.08">
    <!-- Doctor's body -->
    <rect x="30" y="60" width="40" height="80" rx="20" fill="#0ea5e9"/>
    <!-- Doctor's head -->
    <circle cx="50" cy="40" r="25" fill="#0ea5e9"/>
    <!-- Doctor's arms (examining) -->
    <rect x="15" y="70" width="15" height="50" rx="7" fill="#0ea5e9"/>
    <rect x="70" y="70" width="15" height="50" rx="7" fill="#0ea5e9"/>
    <!-- Stethoscope around neck -->
    <path d="M35 60 Q50 50 65 60" stroke="#0ea5e9" stroke-width="6" fill="none"/>
  </g>

  <!-- Patient Figure -->
  <g transform="translate(1300, 550)" opacity="0.08">
    <!-- Patient's body (lying down) -->
    <rect x="20" y="80" width="60" height="30" rx="15" fill="#64748b"/>
    <!-- Patient's head -->
    <circle cx="50" cy="70" r="20" fill="#64748b"/>
    <!-- Patient's arms -->
    <rect x="5" y="85" width="15" height="20" rx="7" fill="#64748b"/>
    <rect x="80" y="85" width="15" height="20" rx="7" fill="#64748b"/>
  </g>

  <!-- Medical Chart/Clipboard -->
  <g transform="translate(900, 300)" opacity="0.1">
    <rect x="0" y="0" width="80" height="120" rx="5" fill="#0ea5e9"/>
    <line x1="10" y1="20" x2="70" y2="20" stroke="#ffffff" stroke-width="3"/>
    <line x1="10" y1="40" x2="70" y2="40" stroke="#ffffff" stroke-width="3"/>
    <line x1="10" y1="60" x2="70" y2="60" stroke="#ffffff" stroke-width="3"/>
    <line x1="10" y1="80" x2="70" y2="80" stroke="#ffffff" stroke-width="3"/>
    <line x1="10" y1="100" x2="70" y2="100" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- Heartbeat Monitor -->
  <g transform="translate(600, 200)" opacity="0.12">
    <rect x="0" y="0" width="150" height="80" rx="10" fill="#0ea5e9"/>
    <rect x="10" y="10" width="130" height="60" rx="5" fill="#000000" opacity="0.8"/>
    <!-- Heartbeat line -->
    <path d="M20 40 L35 40 L40 25 L45 55 L50 40 L65 40 L70 25 L75 55 L80 40 L95 40 L100 25 L105 55 L110 40 L125 40"
          stroke="#00ff00" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Medical Cabinet -->
  <g transform="translate(200, 400)" opacity="0.08">
    <rect x="0" y="0" width="120" height="200" rx="5" fill="#64748b"/>
    <!-- Cabinet doors -->
    <rect x="5" y="5" width="55" height="190" rx="3" fill="#94a3b8"/>
    <rect x="60" y="5" width="55" height="190" rx="3" fill="#94a3b8"/>
    <!-- Handles -->
    <circle cx="32" cy="100" r="3" fill="#0ea5e9"/>
    <circle cx="87" cy="100" r="3" fill="#0ea5e9"/>
  </g>

  <!-- Medical Symbols -->
  <g transform="translate(1700, 200)" opacity="0.1">
    <!-- Medical cross -->
    <rect x="10" y="0" width="20" height="60" fill="#0ea5e9"/>
    <rect x="0" y="25" width="40" height="10" fill="#0ea5e9"/>
  </g>

  <g transform="translate(150, 150)" opacity="0.08">
    <!-- Caduceus symbol -->
    <line x1="20" y1="0" x2="20" y2="60" stroke="#0ea5e9" stroke-width="4"/>
    <circle cx="20" cy="15" r="8" fill="#0ea5e9"/>
    <circle cx="20" cy="45" r="8" fill="#0ea5e9"/>
    <line x1="12" y1="15" x2="28" y2="15" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="12" y1="45" x2="28" y2="45" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <!-- DNA Helix -->
  <g transform="translate(400, 700)" opacity="0.06">
    <path d="M0 0 Q60 -30 120 0 Q180 30 240 0 Q300 -30 360 0" stroke="#0ea5e9" stroke-width="4" fill="none"/>
    <path d="M0 50 Q60 20 120 50 Q180 80 240 50 Q300 20 360 50" stroke="#0ea5e9" stroke-width="4" fill="none"/>
    <line x1="30" y1="0" x2="30" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="90" y1="0" x2="90" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="150" y1="0" x2="150" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="210" y1="0" x2="210" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="270" y1="0" x2="270" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="330" y1="0" x2="330" y2="50" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <!-- Subtle medical icons scattered -->
  <g transform="translate(800, 600)" opacity="0.05">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M30 50 L70 50 M50 30 L50 70" stroke="#0ea5e9" stroke-width="2"/>
  </g>

  <g transform="translate(1000, 800)" opacity="0.05">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M20 50 L80 50 M50 20 L50 80 M30 30 L70 70 M70 30 L30 70" stroke="#0ea5e9" stroke-width="2"/>
  </g>
</svg>
    <line x1="30" y1="0" x2="30" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="90" y1="0" x2="90" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="150" y1="0" x2="150" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="210" y1="0" x2="210" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="270" y1="0" x2="270" y2="50" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="330" y1="0" x2="330" y2="50" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <!-- Medical equipment silhouettes -->
  <g transform="translate(300, 700)" opacity="0.06">
    <!-- Blood pressure monitor -->
    <rect x="0" y="20" width="80" height="60" rx="10" fill="#0ea5e9"/>
    <rect x="10" y="30" width="60" height="8" fill="#0ea5e9"/>
    <rect x="10" y="45" width="60" height="8" fill="#0ea5e9"/>
    <circle cx="40" cy="70" r="15" fill="#0ea5e9"/>
    <rect x="25" y="85" width="30" height="8" fill="#0ea5e9"/>
  </g>

  <g transform="translate(500, 650)" opacity="0.06">
    <!-- Medical chart -->
    <rect x="0" y="0" width="100" height="120" rx="5" fill="#0ea5e9"/>
    <line x1="10" y1="20" x2="90" y2="20" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="10" y1="60" x2="90" y2="60" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="10" y1="80" x2="90" y2="80" stroke="#0ea5e9" stroke-width="3"/>
    <line x1="10" y1="100" x2="90" y2="100" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <!-- Heartbeat line -->
  <g transform="translate(800, 800)" opacity="0.12">
    <path d="M0 50 L25 50 L30 30 L35 70 L40 50 L65 50 L70 30 L75 70 L80 50 L105 50 L110 30 L115 70 L120 50 L145 50 L150 30 L155 70 L160 50 L185 50"
          stroke="#0ea5e9" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Medical symbols -->
  <g transform="translate(1600, 400)" opacity="0.08">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#0ea5e9" stroke-width="3"/>
    <path d="M30 50 L70 50 M50 30 L50 70" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <g transform="translate(200, 500)" opacity="0.08">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#0ea5e9" stroke-width="3"/>
    <path d="M20 50 L80 50 M50 20 L50 80 M30 30 L70 70 M70 30 L30 70" stroke="#0ea5e9" stroke-width="3"/>
  </g>

  <!-- Subtle glow effect -->
  <rect width="1920" height="1080" fill="url(#medicalGlow)"/>
</svg>